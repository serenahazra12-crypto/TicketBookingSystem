<!DOCTYPE html>
    <html>
        <head>
            <title>Movie Ticket Booking App</title>
            <link rel="stylesheet" href="style.css">
            <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
            <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
        </head>
        <body>
            <div id="container" class="container">
                <h1>🎬 Movie Ticket Booking 🍿🥤</h1>
                <div class="auth-container">
                    <h2>Login or Register</h2>
                    <input type="text" id="user-name" placeholder="Enter Your Username">
                    <input type="email" id="user-email" placeholder="Enter Your Email">
                    <input type="password" id="user-password" placeholder="Enter Your Password">
                    <button id="register-btn">Register</button>
                    <button id="login-btn">Login</button>
                </div>
            </div>
            <script src="script.js"></script>
        </body>
    </html>
